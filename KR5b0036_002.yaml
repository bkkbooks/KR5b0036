front:
  text: 太上洞玄靈寶赤書玉訣妙經卷下乃二元始上帝靈寶尊神十方大聖妙行真人常以一年三詣南帝洞陽宫挍定天元推數劫㑹開明赤書五老真文封題玉磧以付五帝元始五氣常以雞鳴上㑹靈寶玉京玄都上宫陽光初明散元始之暉流觀諸天其氣鬱鬱其暉熏熏精如月珠光如紫雲五氣運轉如車之輪上御九天之闕中固五帝靈山下注學士五牙之根上宫衆聖大智真人皆以其時餐食其暉仰咽其精與天相承致得無窮太上道君請注其文以傳至真依靈寶玄科四萬劫一傳如是靈寶明見出法度人十方大聖尊神妙行真人同㑹南圃丹霍之阿三元洞室封題玉磧衆真侍座香華伎樂五千萬衆真文奕奕光明洞達五氣觀暉照映內外雲景秀朗如星中之月竒相衆好不可勝量是時北室有精進賢者王福度有女名曰阿丘曽厥年十六時在浴室中浴香湯自洗見金光明曲照疑有不常出宇登墻南向望見道真神精煒爍容景煥日女意歡喜義手作禮遙稱名丘曽今遭幸會身覲天尊歸身十方天中之天願賜禁戒遵承法文拔諸惡根早得轉輪攺為男形萬劫之後冀得飛仙五帝魔王見女發心大願恐過我界因化作五帝老人往告女曰我受十方尊神使命來語女靈寶法典吾道方行法使仁愛慈孝為本始聞汝父當出女身已受人言不可得違宜先從之人道既備禮訓亦足餘可投身天監爾心汝不從父仙無由度女答魔曰我前生不幸宿無因緣功德未充致作女身晨夕悔念誓守一心用意堅固出於自然生由父母命歸十天誠違父教不如君言魔見女執心秉直不可得干於是便退丘曽自云道既髙邈無緣得暢仍聚柴登墻焚燒我身冀我形骸得成飛塵隨風自降往至道前於是火然丘曽義手向天言十方無極天尊今自歸形骸天中之天願得時暢如之散塵便投身火中燌爾無著身如蹈空俄頃之間巳見女身化成男子徑至道前於是受誡元始即命南極尊神為女之師授女真文給太華玉女金晨玉童各三百人衆好佩發三十二相洞映女身道告南極尊神此女前生巳奉靈寶轉輪萬劫今得化生人中見吾出法即得化形當更度人九萬九千乃得至真大神是時十方是男是女皆發正真道意莫不精心持齊奉戒修承靈寶預有至願皆得度世道告阿丘曽曰南極尊神昔往亦為女子生於禪黎世界赤明天中大作功德諸天所稱道業未成乃值火劫數交天地易位其在棄蕩之例南上感其丹至朱宫書其紫名化其形骸於元君之胞一劫乃生得為男身於南丹洞陽上館明珠七色寶林師赤帝梵寶昌陽丹靈真老君赤書道成位登南極汝前生與南極同在禪黎世界於丹陽柏林舍下同發道意爾時南極姓皇字度明執汝右手俱題赤石記姓名南宫即書汝筆跡題於南軒今猶尚在石字亦存汝憶之否丘曽心悟降目見南極所住南璧刻書太甲歲七月一日皇度明阿丘曽同於丹陽柏林舍下發願合二十三字字甚分明憶此未久忽經天地三易劫運今乃得生靈寶之世道語丘曽爾今得師南極豈不髙乎皆由爾身宿緣所致當勤加上業廣度天人功滿德備自當令爾位及至真超凌三清迅足九霞朝宴太玄也丘曽稽首道前丘曽先身有幸得生道世獲遇天真曲逮幽室光廕臰形神啓壇內心應形外投骸歸命萬希一全髙上玄鑒轉度我身既得化形侍對天尊復蒙南極得訓師宗喜懼之懷靡知所陳惟垂成就明所未聞玉訣寶妙願特哀矜太上道君登命赤帝靈童開九霜玉笈七色之藴出靈寶赤書玉訣二卷以付南極使依盟授受丘曽衆仙監盟一時稱善元始赤書服食青牙導引九氣青天玉訣元始赤書五篇真丈生於太空之中天地未光開闢未明潜結元根三景成立五氣行焉五色分彩煥照五方置以五帝遵以隂陽輪轉九天之紐運眀五星之光殖地五嶽以安鎮澳人五府以養神是以至真之人常依陽光之始明上導九天之和氣下引玉泉之流芳致元精於太極招五帝於靈童溉之者不衰存之者無窮回萬劫而更始保五牙於顔容實靈寶之妙訣恢萬聖之宗也修養青牙導引東方九氣青天之法當以立春之日雞鳴入室東向九拜平坐叩齒九通思東方安寶華林青靈始老君姓爓諱開明字靈威仰形長九寸頭冠青精玉冠衣九氣青羽飛衣駕乘蒼龍之輿建鶉旗從甲乙玄老之官九萬人從九氣青天中下降室內須㬰化生青氣鬱鬱如雲之沓煙溉覆己形從已口中而入直下肝府又思木德煥明東方光照我身皆令分明竟便開目仰呪曰九氣青天元始上精皇老尊神衣服羽青設御天宫煥明歲星散暉流芳陶激身形上餐朝霞服引木精固養青牙保鎮朽齡肝府充溢玉芝自生回年億劫色反童嬰五氣和合天地長并
