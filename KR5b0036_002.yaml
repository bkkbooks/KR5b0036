body:
  text: 畢引青氣九咽止便服東方赤書玉文一十二字右十二字則九氣青天之名導引青帝九氣服食青牙皆朱書白紙上存思訖而頓服之則引九氣而自降青帝應聲而見形青牙堅固於東嶽肝府玉芝而自生靈童齎真文於寢側青腰輔翼而使令九年積感變化立成神仙度世萬劫不傾也當以雞鳴陽光始分東向叩齒九通摩兩掌令熱以手摩拭面目九過仰呪曰東方青牙服食青牙飲以朝華畢便以舌撩上齒之表䑛唇三過令玉泉滿口而咽之三過又引青氣九咽令鎮肝之中其道畢也元始赤書服食赤牙導引三氣丹天玉訣修養丹牙導引南方丹天之法當以立夏之日雞鳴入室南向三拜平坐叩齒三通思南方梵寶昌陽丹靈真老君姓洞浮諱極炎字赤飄弩形長三寸頭冠丹精玉冠衣三氣丹羽飛衣駕乘丹龍玉輿建朱旗從丙丁越老之官三十萬人從三氣丹天中下降室內須㬰化生赤氣煥煥如火之明溉覆已形從已口中而入直下心宫又思火星煥明南方光照我身皆令分明竟便開目仰呪曰三氣丹天朱宫靈童元始上帝參駕赤龍丹羽飛衣錦帔明光驅䇿靈官運導隂陽三氣吐暉灌我絳宫赤子保鎮錬牙飭容朝餐朱景玉芝滿充回停劫年朽骸反童長齡天地永享無窮身生水火變化百方畢引赤氣三咽止便服南方赤書玉文一十二字右十二字則三氣丹天之名導引赤帝三氣服食丹牙皆赤書白紙上存思訖而頓服之則引赤氣而充溢芳芝玄注於絳宫赤帝降真於存思受赤文於靈童保丹牙以永固餐三氣於祝融䇿赤圭以通靈運五篇以召神長齊感於太寂上天書名於南窗可謂坐致而不難永享而無窮也當以雞鳴陽光始分南向叩齒三通摩兩掌令熱以摩拭面目三過仰呪曰南方朱丹服食朱丹飲以丹池畢以舌撩下齒之表䑛唇嗽口令玉芝滿口而三咽之又引赤氣三咽令鎮心宫之中其道畢也元始赤書服食戊已導引元氣黃天玉訣修養黃牙導引戊已十二氣黃天之法當以春分夏節秋分冬節四日雞鳴入室向王十二拜平坐叩齒十二通思中央玉寶元靈元老君姓通班諱元氏字含樞紐形長一尺二寸頭冠黃精玉冠衣五色黃羽飛衣駕乘黃龍玉輿建黃旗從神戊巳傖老之官十二萬人從十二氣黃天中下來降室內須㬰化生黃氣勃勃如景雲之吐暉灌覆已形從口中而入直下脾府又思土星煥明中天光照我身皆使分明竟便開曰仰呪曰中黃嵩山元氣徘徊上有元老總統四垂參駕黃龍五色羽衣運導九天轉輪璇璣煥明土星流光散暉玉英芳芝充溢四肢陶灌我身脾府鮮開養牙餐精萬神總歸檢魂制𩲸仙錬八威表裏洞明長生不衰通真達靈升入太微畢引黃氣十二咽止便服中央赤書玉丈一十六字右十六字則中央黃天之名導引黃帝十二氣服食黃牙皆赤書白紙上存思訖頓而服之則上引元氣於九天下注玄膺於妙門太倉氣糧而自充脾府不澳而自熏黃老應響以玄和靈童披襟而告文黃素運走給命東西妙哉玉訣為萬仙之端當以雞鳴陽光始分向王叩齒十二通摩兩掌令熱以摩拭面目十二過仰呪曰中央戊己昻昻太山服食精氣飲以醴泉畢以舌撩舌上玄膺取玉泉䑛唇三過咽之又引黃氣一十二咽令鎮脾府之中其道畢也元始赤書服食素牙導引七氣素天玉訣修養素牙導引七氣素天之法當以立秋之日雞鳴入室西向七拜畢平坐叩齒七通思西方七寶金門皓靈皇老君姓上金諱昌開字曜𩲸寶形長七寸頭冠白精玉冠衣白羽飛衣駕乘白龍玉輿建素旗從神庚辛胡老之官七十萬人從七氣素天中下來降室內須㬰化生白氣皓皓如秋雲之羅天灌覆已形從口中而入直下肺府又思金星煥明西方光照我身皆使分明竟便開目仰呪曰七靈七門皓映西華中有素皇元始之家參駕白龍七氣峩峩徘徊玉門散精朱霞金星吐暉芳芝滂沱玄澳我身養我素牙明石鮮光萬劫不殂服以流泉餐以太和九天上帝給以玉華保年駐顔白景敷羅長存天地三光同遐畢引白氣七咽止便服西方赤書玉丈一十二字右十二字則西方七氣素天之名導引白帝七氣服食素牙皆赤書白紙上存思訖頓而服之則七氣天神玄注素暉灌溉明石自生玉芝肺宫開明而納真太倉不哺而自熏素靈應響而驅䇿參承九天之門餐之不休壽與元始同年當以雞鳴陽之始分向西叩齒七通摩兩掌令熱以摩拭面目七過仰呪曰西方明石服食明石飲以靈液畢以舌撩齒上舐唇漱口令玉芝滿口便三咽之又引白氣七咽令鎮肺府之中其道畢也元始赤書服食玄牙導引五氣玄天玉訣修養玄牙導引五氣玄天之法當以立冬之日雞鳴入室北向五拜畢平坐叩齒五通思北方洞隂朔單鬱絶五靈玄老君姓黑節諱靈㑹字隱侯局形長五寸頭冠玄精玉冠衣玄羽飛衣駕乘黑龍玉與建皂旗從神壬癸羌老之官五十萬人從五氣玄天中下來降室內須㬰化生黑黑暉暉相沓光若流星之煥曜灌覆已形從口中而入直下腎府又思水星煥明北方光照我身皆使分明竟便開目仰呪曰北方玄天五氣散靈上有大神始老元精駕龍建旗遊宴上京是日元吉慶雲敷榮飛芝流灑滂沱四盈玊女玄澳灌我身形腎宫充鎮朽牙堅生五府納真上通神明五老降接仙道早成變化水火衣服羽青飛行太空遊造帝庭壽同三景萬劫長齡畢引黑氣五咽止便服北方赤書玉文一十二字右十二字則北方五氣玄天之名導引黑帝五氣服食玄牙皆赤書白紙上存思訖頓而服之則玄老負籍於朱宫靈童題簡於赤文五氣流芝澳於枯宅玉泉滂沱生於端門神鎮靈闕腎府生熏太玄玉女役使東西萬劫不衰玄老同存當以雞鳴陽光始分北向叩齒五通摩兩掌令熱以摩拭面目五過仰呪曰北方玄滋服食玄滋飲以玉飴畢以舌撩下齒之裏舐唇漱口令玉芝滿口三咽又引黑氣五咽令鎮腎府之中其道畢也道言導引餐牙之法當以八節之日各依其方入室清齊存思五老形象呪祝畢各隨方導引服諸天名行之八年仙官下降玉女侍衛身生光明照映十方出入遊行五帝稽首三界司迎此位准三天上真之號此文具藏南圃赤洞五城之內三天仙官備守仙樓十二重藏以紫玉之匱刻以黃金之札封以丹芝光草印以太上中章皆授宿有仙籍名書丹臺應為三天上真之人自無此挺終不得盻篇目舊科四百年一出傳當以雞鳴安身定神以次行事先服東方青牙氣次南方次中央次西方次北方如常法五帝畢便叩齒三十六通咽氣二十五過止又都呪曰白石巖巖行源湧泉洞以玉漿飲之長生壽命益長畢以舌撩口上下中央令玉芝滿口而三三咽又引氣二十五過極氣而咽之其道都畢也元始五老存思五嶽五帝招靈求仙玉訣凡修靈寶五篇真文思神念仙諸所求欲時聞九天真人詣房身得神仙當以立春後甲寅乙卯日沐浴清齊平旦入室東向九拜平坐叩齒九通關啓身神畢閉眼思東嶽泰山青帝君姓玄丘諱目陸形長九寸九分頭戴青玉通大寶冠衣青羽飛衣駕乘青龍從青腰玉女十二人從東方來降兆室良久青帝君化為嬰兒始生之狀在青氣之中隨氣從兆口入徑至肝中思心生赤氣以灌繞肝府青赤二氣混沌相著如慶雲之沓煙覺肝中熏熱便九咽仰呪曰東天九門中有始皇出入三清遨宴華房安鎮靈嶽役運句芒上繞青霞九千萬重參駕羽輦十二飛龍左侍青腰右衛神童把執簡籍青札玉文校定仙名列言上宫今日王吉請陳所言身佩赤書名參帝堂願神願仙青録簿中上回靈駕來降我房二氣混合化形嬰蒙安治肝府招致華光靈暉流灌面生金容坐致自然神明交通身得長生天地無窮畢引青氣九咽止行此道九年則東嶽靈官青帝降真致青腰玉女九人為兆通達上聞九天生死父母罪書責役配屬東嶽則神明更相囑付滅除罪名自得解脫升上福堂此法妙重生死津梁當以立夏後丙午丁巳之日沐浴清齊正中入室南向三拜平坐叩齒三通關啓身神畢閉目思南嶽霍山赤帝君姓爓諱洋光形長三寸三分頭戴赤玉通天寶冠衣丹羽飛衣駕乘赤龍從赤圭玉女十二人從南方來降兆室良久赤帝君化為嬰兒始生之狀在赤氣之中隨氣從兆口入徑至心中思脾生黃氣以灌繞心宫黃赤二氣混沌相著如炎火之爛光覺心中熏熱便三咽仰呪曰丹天三氣南上玉門中有大神赤帝靈君衣丹帶符飛文羽裙駕乘赤龍玉輿絳雲南霍靈山萬神髙尊出入三清上宴九玄赤圭侍役玉童衛真把執簡録絳簿玉文校定仙品輕重上聞今日大王靈嶽開仙上回萬神降我三門變化嬰兒鎮心安魂混合二氣纏我命根長與祝融駕乘景雲逍遙南阿天地長存畢引赤氣三咽止行此道三年則南嶽霍山靈官赤帝降真致赤圭玉女三人為兆驅使通致啓願萬求皆從生死父母罪書刑責配屬南嶽皆得解除刑名釋散升上天宫其法妙重坐死開通也當以春分夏節秋分冬節後戊辰戊戌巳丑已未之日沐浴清齊日映入室向王十二拜平坐叩齒十二通關啓身神畢閉眼思中嶽嵩山黃帝君姓角諱普生形長一尺二寸頭戴黃玉通天寶冠衣黃羽飛衣駕乘黃龍從黃素玉女十二人從中嶽來降兆室良久黃帝君化為嬰兒始生之狀在黃氣之中隨氣從兆口入徑至脾府思肺生白氣灌繞脾宫黃白二氣混沌相者似黃雲之回天覺脾中熏熱便十二咽仰呪曰中天黃元總統四靈戊已中山元始上精黃帝大神參駕飛軒十二黃龍上宴三清玉女侍衛神童使令開山出圖校仙定名徘徊中嶽日王敷靈回真曲降流灌我形混元變化老帝成嬰鎮安黃宫府藏華榮身有竒毛內外光明真人交接通達九清得參黃軿飛升玉庭畢引黃氣十二咽止行此道十二年則中嶽靈官五帝降房致黃素玉女十二人為兆通達關啓上聞九天生死父母罪書刑名係於中嶽皆得解散滅絶罪書上名仙録去離地官升入福堂生死開泰度人無量也當以立秋後庚申辛酉之日晡時沐浴清齊入室向西七拜平坐叩齒七通關啓身神畢閉眼思西嶽華山白帝君姓浩丘諱元倉形長七寸七分頭戴素玉通天寶冠衣素羽飛衣駕乘白龍從白素玉女十二人從西嶽來降兆室良久白帝君化為嬰兒始生之狀在白氣之中隨氣入兆口中徑至肺府思腎生黑氣以灌繞肺宫白黑二氣混沌相著似慶雲之沓霄覺肺中熏熱便七咽仰呪曰七氣之天素皇金堂白帝大神安鎮西方華隂靈山號曰神王白羽飛裙建旗御龍上遊玄清出入華宫總領仙籍列簡諸方吉日嘉辰萬聖宴降徘徊九霞流散暉光金精煥煥白石洋洋開仙觀靈神敷四鄉願道願仙願生願長上願既㑹靡不吉昌蓐收通真攺我形容變化自成與氣同翔身飛骨輕上升紫房畢引白氣七咽止行此道七年則西嶽靈官白帝降真致白素玉女七人為兆通靈關啓所求皆聞九天生死父母罪書刑名係於西嶽咸得解脫罪書自除名上仙籍去離五道永升福堂生死開度福慶自然也當以立冬後壬子癸亥之日子時沐浴清齊入室北向五拜平坐叩齒五通關啓身神畢閉眼思北嶽𢘆山黑帝君姓伏諱通萌形長五寸五分頭戴玄玉通天寶冠衣玄羽飛衣駕乘黑龍從太玄玉女十二人從北嶽來降兆室良久黑帝君化為嬰兒始生之狀在黑氣之中隨氣入兆口中徑至腎府思肝生青氣以灌繞腎府青黑二氣混沌相著如碧雲之沓煙覺腎中熏熱便五咽仰呪曰五氣玄天上始精流結氣凝靈號曰仙廬安鎮北𢘆黑帝所遊遨宴北單參龍駕浮今日王吉萬靈開圖五氣徘徊慶雲四敷仙童執簡太玄度符記我仙籍金籙上書回真曲降混合嬰孩二氣交絡洞灌我軀玄冥携提神仙為儔永享天地萬劫無休畢引黑氣五咽止行此道五年則