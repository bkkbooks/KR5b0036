front:
  text: 太上洞玄靈寶赤書玉訣妙經卷上乃一爾時元始天尊太上大道君五老上帝十方大神會於南丹洞陽上館坐明珠七色寶座時有五帝大聖玄和玉女五萬二千五百衆詣座天灑香華神龍妓樂無鞅數衆紫雲四敷三景齊明天元合慶衆真齊駕時有精進學士王龍賜侍座請受法戒道告龍賜吾於七百萬劫奉修靈寶立願布施持戒執齋勤苦不退展轉生死忍辱精進斷除異念空受無想積感玄寂得作衆聖道尊常用慈念欲令廣度衆生是男是女好願至人咸使得見靈寶妙法爾有善心來歸法門由爾前生萬劫巳奉至真功滿德足致生道世值遇法興今當為爾解説凝滯十部妙經使爾救度十方諸天人民勤為用心勿使魔言道曰生死因緣輪轉福願莫不由身人身難得道世難遇經法難值訣言難聞吾所以敷張玄旨解説要言者何感念十方天人受生不能保度其身長處苦惱甘心履罪展轉五道無能覺者是故廣明法教開導愚蒙咸使天人得入旡上正真之門普度一切生值此世真以宿緣所從真人皆得過度吾受元始真文舊經説經度世萬劫當還無上宛利天過世後五濁之中運命不達是男是女不見明教常處惡道生壽無機而憂惱自嬰多受枉橫自生自死輪轉五道墮於三途八難之中殃對相尋無有極巳生死分離無有豪賤實為痛心今解説諸要以度可度汝好正意諦受吾言於是注訣龍賜稽首伏受教旨道曰子受靈寶大戒當起北向首體投地禮於十方東向伏聽十戒一者心不惡妬無生隂賊檢口愼過想念在法二者守仁不殺愍濟群生慈愛廣救潤及一切三者守貞讓義不淫不盜常行善念損己濟物四者不色不欲心無放蕩貞潔守愼行無點汚五者口無惡言言不華綺內外忠直不犯口過六者減酒節行調和氣性神不損傷無犯衆惡七者不得嫉人勝己爭競功名每事遜讓退身度人八者不得評論經教訾毀聖文躬心承法常如對神九者不得鬪亂口舌評詳四輩天人咎恨傷損神氣十者舉動施為平等一心人和神睦行常使然修奉清戒每合天心常行大慈願為一切普度厄世慊慊尊教不得中怠寧守善而死不為惡而生於是不退可得拔度五道不履三惡諸天所護萬神所敬長齋奉戒自得度世道言靈寶開法度人有十二可從而得度世者爾宜從之自得正直終入無為一者見真經出法開度一切便發道意心願後世得登大聖二者常行慈心願念一切普得見法開度廣逺無有障翳三者好樂經教深逺覽達意志堅明開化愚暗四者尊受師訓廣開勸化令入法門逺離盲道五者信向玄妙尊奉經訣晨夕念誦無有怠倦六者不務榮華斷俗因緣專心定志所營在法七者勤誦大經願念一切廣開橋梁為來生作緣八者常生善心不邪不偽無嫉無害無惡無妬九者在所隨生常值聖世與靈寶法教相值不絶十者潔身持戒修齋建功廣救群生咸得度脫十一者學業廣覽宣通經法預以天人普令開度十二者常與明師世世相值受教宣化度人無量是為十二妙訣能行此善念世世得見聖文與道結緣諸天犮識獨步三界無所罣礙長離三惡五道八難神明敬護地祇擁衛門戶清肅萬災不干諸所求願讀誦此經皆得成就是善男子善女人精心尊奉皆為十方大聖所有洞達自然身生水火變化形影飛升上清功德未滿應經滅度即為五帝所迎徑升天宮不過泰山化生貴門與經道相遇徑得度世道告龍賜勤行諦受勿為懈怠龍賜稽首伏承戒曰道言真文呪説髙上法度舊文宛奧不可尋詳後來學者難可施用故髙下注筆以解曲滯玉訣真要開演古文微辭玄妙諸天所尊披誦玉章十方遙唱上天設禮神魔降伏鬼妖滅爽侍文玉童玉女各五十人自無前生萬劫題名太玄不得見此玉文運會遭遇尅得神仙福延九祖潤流玄孫皆得度脫三惡五道八難之中斯文尊貴妙不可勝元始靈寶告水帝削除罪簡上法靈寶某帝先生某甲年如干歲某月生願神願仙長生不死三元同存九府水帝十二河源江河淮濟溟泠大神乞削罪名上聞九天請詣水府金龍驛傳太歲某年某月某朔某日某時於某國告文
