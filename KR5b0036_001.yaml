body:
  text: 右朱書銀木簡上以青紙裹簡青絲纏之金龍負簡以投三河之淵初用金鈕九隻連簡沉之後投不須三過都止投簡當於清泠之淵北向叩齒三通讀簡文呪曰元始五老上帝髙尊十方至真太華靈仙赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝溟泠大神今日上告萬願開陳請投玉簡乞削罪名千曽萬祖九族種親罪根連染及得我身普蒙削除絶滅種根記名水府言上帝前七祖父母去離八難上登九天衣食自然我罪釋散萬神咸聞請以金鈕關明水官請如斯陳金龍驛傳元始靈寶告五嶽靈山除罪求仙上法靈寶某帝先生某甲年如干歲某月生命屬某帝名係泰山願神願仙長生度世飛行上清五嶽真人至神至靈乞削罪籍上聞九天請詣靈山金龍驛傳太歲某甲子某月某朔某日某時於某嶽告文右朱書銀木簡青紙裹之青絲纏之金鈕九隻金龍負之埋本命之嶽悉如上法於本命之嶽東向叩齒九通讀簡文竟呪曰玄上開明元始監真上帝五老赤書丹文天地本始總領三元攝氣召會催促降仙髙上符命普告十天日月星宿五嶽靈山天下地上溟泠大神監生主録南上三門開領玉簡勒名丹篇削落罪書上補帝臣千曽萬祖九族種親皆蒙解脫五道八難去離三惡魂升九天生死開度萬劫長存今日上告萬神咸聞請以金鈕關盟真官請如所告金龍驛傳元始靈寶告九地土皇滅罪言名求仙上法靈寶某帝先生某甲年如干歲某月生命係九天東斗領籍願神願仙長生度世飛行上清中皇九地戊已黃神土府五帝乞削罪録勒上太玄請詣中宫投簡記名金鈕自信金龍驛傳太歲某甲子某月某朔某日某時於某郡縣中告文右朱書銀木簡青紙裹之青絲纏之金紐九隻金龍負之埋所住中宫悉如上法於中庭向壬叩齒十二通讀簡文竟呪曰天開地張九氣分靈三元同符十方朗清五老上帝開真領生丹書赤文元始上精普告天下九土皇靈今日上告萬仙定生我願我仙請投玉名土府太皇勒除罪刑奏簡上宫列簿華青早得飛騰天地同靈九祖種親腐骸更榮魂升南宫受化仙庭日吉告命萬神咸聽請以金鈕表盟至情請如所告金龍驛呈道曰爾有志心發無上道意欲度諸天人民善男善女咸使得離三惡五道八難之中得過惡世與道相值當以八莭甲子之日投三元玉簡除宿罪簿言名上天事事三過諸天三官九府更相囑寄上天分别萬神敬護五帝侍衛三界司迎門户整肅天下地祇日月來朝千魔萬精不敢妄干志願堅白蠲向咸成七祖父母即得解脫三途五苦上升天宫生死福慶影響相酬三官九府書人功過其理甚明世世因緣毫分無虧爾諦奉行勿為懈怠使魔壞爾真東方九氣青天真文赤書玉訣東方九氣始皇青天碧霞鬱壘中有老人總校圖録攝氣降仙其二十四字主召九天上帝校神仙圖録學仙道士常以本命甲子立春之日青書二十四字於白剌記姓名年月於剌下投靈山之嶽九年仙官到使青腰玉女九人身得飛仙歲星輔肝角亢鎮真氐房心尾四景回旋箕主七辰正斗明輪承氣捕非掃除災群其三十二字主召天宿星官正天分度諸以天災星宿越錯朱書三十二字於青𥿄上露於中庭九日九夜夕夕依法别呪訖以火焚散灰於青煙之中并刻書三十二字於青石上埋東方天災自消星宿復位東山神呪攝召九天赤書符命制會酆山束魔送鬼所誅無蠲悉詣木宫敢有稽延其三十二字主攝鬼魔正九天氣行此法朱書青木剌上以文向東北而依别呪文三呪鬼自束形萬妖自滅精心行之下制東河溟海水神大劫洪災蛟龍負身水府開道通徑百千上帝赤文風火無間其三十二字主攝東海水帝大劫天災之數召蛟龍及水神事遇水災及欲渡大水黃書三十二字於青𥿄上依别呪以投水中身自得過蛟龍負載河伯奉迎水下可行也合一百二十字皆元始自然之書一名生神寶真洞玄章一名東山神呪八威䇿文南方三氣丹天真文赤書玉訣南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三氣勃光神仙受命應運太陽其三十二字主九天神仙圖録宿名學仙道士常以本命甲子立夏之日朱書三十二字於白剌上記姓名年月於剌下投靈山之嶽九年仙官到使朱陵玉女三人身得飛仙熒惑輔心井鬼守房柳星張翼統御四鄉軫總七宿回轉天常召運促會正道驛行赤文命靈其三十六字主召星官明度數正天分度南方星宿越錯有諸災異當朱書青紙上露於中庭三日三夜夕夕南向依别呪法訖以火燒文散之於青煙之中并别刻書三十六字於赤石上埋南方天災自消星宿復位北攝酆山束送魔宗符教所討明列罪源南山神呪威伏百千群妖滅爽萬試摧亡其三十二字主制北酆正鬼氣行此法黃書赤木剌上以文向北而依别呪文三行此法鬼精自滅萬魔束形宜精心行之南河水帝太伯龍王神呪流行普掃不祥洪水飛災止蛟召龍開除水徑千道萬通敢有干試攝送火宫赤書所告莫有不從其四十八字主攝南海水帝大運交洪水四出召蛟龍水神事遇此災及渡大水皆黃書四十八字於青𥿄上依别呪以投水中自得過度水官奉迎合一百四十八字皆南方梵寶昌陽丹靈真老君自然之書一名南雲通天寶靈襟一名九天神呪一名赤天八威䇿文中央黃天真文赤書玉訣中央總靈黃上天元始生五老中黃髙尊攝氣監真總領群仙典録玄圖宿簡玉文催運上氣普告萬神其四十字主神仙玉簡宿名總歸仙氣學仙道士以本命甲子春分夏至之日黃書四十字於白剌上記姓名年月於剌下投靈山之嶽九年仙官到使黃素玉女十二人身得神仙鎮星輔脾回度北元魁𩲃主非截邪斬根𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛傳其四十字主攝星官正天度數諸中央星宿越錯生諸災異當以朱書四十字於青紙露於中庭十二日十二夜夕夕向王依别呪法訖以火燒文散之於青煙之中并刻書四十字於黃石上埋中央天災自消星宿復位勑攝北帝遏塞鬼門剪除不祥莫有當前其十六字主攝北帝正天氣檢鬼精行此法白書十六字於黃木剌上以文向東北而依别呪文三行此法鬼精自滅天魔束形宜心行之中山神呪召龍上雲制會黃河九水河源不得怠縱善惡悉分千妖萬姧上對帝君莫有干試太陽激燌赤書玉字宣告普聞其四十八字主攝中海水帝四源之水洪災湧溢之數召水神及蛟龍事欲過洪水之災及渡大水皆當黃書四十八字於青紙上依别呪投水中自得過渡水官奉迎合一百四十四字皆中央玉寶元靈元老君自然之書一名寶劫洞清九天靈書一名黃神大呪一名黃帝威靈策文西方七氣素天赤書玉訣西方素天白帝七門金靈皓映太華流氛白石峨峨七氣氤氲上有始生皇老大神總領肺氣主校九天檢定圖録制召上仙其四十八字主召仙氣學仙道士常以本命甲子立秋之日白書四十八字於白剌上記姓名年月於剌下投靈山之嶽九年仙官到使太素玉女七人身得神仙太白檢肺奎婁守魂胃昴畢觜主制七關參總斗魁受符北元其二十四字主白帝星官正明天度諸西方星宿越錯有諸災異當以朱書青紙上露於中庭七日七夜夕夕向西依别呪法訖以火燒文散灰於青煙之中并刻書二十四字於白石上埋西方天災自消星宿復位赤書玉字九天正文攝召萬氣普歸帝君其十六字主攝六天鬼氣行此法黑書十六字於白木剌上以文向東北而依别呪文七過行之鬼精自滅萬魔束形宜精心行之西山神呪八威七傳符水上龍召山送雲在此授得同到帝門輔衛上真斬滅邪源若有不祥截以金關赤書符命風火驛傳其四十八字主攝西海水帝及水中萬精召雲龍以防水災欲知水中精物及洪水彌天欲度此災皆黃書四十八字於青𥿄上依别呪法投文水中立知水中萬精形象蛟龍負以渡水災水官奉迎也合一百三十六字皆西方七寶金門皓靈皇老君自然之書一名金真寶明洞微篇一名西山神呪一名八威召龍文北方五氣玄天真文赤書玉訣北方玄天五氣徘徊中有黑帝雙皇太微總領符命仙錬八威青裙羽褐龍文鳳衣上帝所降制列玉階其四十字主諸真人神仙圖録學仙道士常以本命甲子立冬之日黑書四十字於白剌上記姓名年月於剌下靈山之嶽五年仙官到使太玄玉女五人名上仙籍矣北辰輔腎斗牛衛扉女虛危室豁落四開璧總七星執凶紏非却災掃穢明道洞輝其三十二字主北方星官正天氣諸以北方星宿越錯有諸災異當以朱書三十二字於青紙上露於中庭五日五夜夕夕向北依别呪法訖以火燒文散灰於青煙之中并刻書三十二字於黑石上埋北方天災自消星宿復位北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅摧其二十四字主攝天魔北帝萬鬼事行此法青書二十四字於黑木剌上以文向東北而依别呪文五過行之鬼精自滅萬魔束形宜精心行之也九河傾竭烏母群飛蛟龍通道水脈洞開赤文玉書驛龍風馳其二十四字主攝北海水帝制水中萬精召蛟龍以負身欲渡大水洪災及遇水難中萬物黃書二十四字於青紙上依别呪文投水中萬物形象身得渡水災蛟龍開水道水官出迎也合一百二十字皆北方洞隂朔單鬱絶五靈玄老君自然之書一名元神生真寶明文一名北山神呪一名八威制天文諸以啓願求道投剌行事莫不悉先東向叩齒三通捻香呪曰無上三天玄元始三氣太上老君召出我身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符各三十六人出關啓此間土地四面真官我今正爾燒香關啓願得十方正真之氣入我身中令所啓上聞徑御無上至真大聖尊神玉帝几前凡學道有所求願及修行上法不先關啓則為邪魔所干不得上達所修無感神明不鑒徒勞無益元始五老修道求仙赤書真文玉訣道言夫學上法思神念道山居靜志修齋誦經轉度七祖身求神仙當行五老赤書真文上法依按舊文皆先叩齒十二通呪曰玄上髙靈元始尊神大聖徘徊萬神臨軒三景敷暉慶雲四陳上告校圖推算九天今日啓願投剌靈山丹書赤字自然真文上告五帝記名玉篇萬神鑒映日月明言願度願生願神願仙天地星宿玄照我身三官九府五嶽大神普告無窮削除罪根元始大開莫不納言七祖幽魂受福自然三途五苦永離八難得與三景同暉紫晨輪轉不滅身得飛仙畢讀剌竟投於絶巖之中便散香靈山之上又叩齒三通向本命呪曰元始監映仙名巳書三官九府罪莫不除散香五帝告盟太虛請如所陳萬劫長居畢仰咽九氣止元始五老禳星宿客災明天分度真文玉訣道言諸天星宿各有分度至於徑道錯越更相侵犯或有異見於四方境域皆由天氣運度否激之災有所防出其分國故以天光轉照玄告不祥故元始垂文和天安地解災却患安國寧民至士精心依法修行災見之日書真文如舊法露於中庭向方面叩齒十二通散髮仰祝曰元始上天三光髙明回景照耀四方朗清運度所衝激揚流星五界錯越三統失寧五斗總辰七宿明靈真君大魁厥諱玉精夫人皇妃字曰育嬰總御玄關回轉諸天今有客災玄告不祥請以真文赤書上呈散髮謝愆披露丹誠惟垂玄監回復天經氣不橫越災不橫生焚燒靈文散煙玉庭上景監度普告萬靈氣清三關災滅九冥隂陽調和國土太平請以金龍風馬驛呈畢露真文於中庭金龍鎮之假令災在東方則九日九夜竟而燒真文散灰於青煙之中凡禳天災安國寧民法皆隨方然燈照諸天光假令東方則然九燈亦可九十燈亦可九百燈用金龍一兩一枚災在東方