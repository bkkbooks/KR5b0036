九年天儀自備靈寶八威神䇿呪曰元始太真五靈髙尊太華皓映洞朗八門五老告命無幽不關上御九天中制酆山下領河海十二水源八威神呪靈䇿玉文召龍負水收氣聚雲束魔送鬼掃蕩妖群萬精摧落所誅無蠲日月五星北斗七元諸天諸地諸水諸山玉真所部溟泠大神仙王遊宴五帝杖幡天丁前驅金虎後奔玃天猛獸羅備四關所呼立到所召立前赤書煥落風火無間所有攝驗金龍驛傳畢叩齒九通仰天三嘯引天氣三咽以䇿文指所告之地閉氣九息而止元始五老鎮靈求仙禳災赤書玉訣道士隱學書青帝赤書真文置東方則東嶽仙官至長齋百日精思靈寶尊神則天真下降給青腰玉女九人取東嶽神仙芝草不死之藥青帝鬼魔逺舍九萬里一方凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土東方及春三月有災欲使東鄉安鎮當赤書青石上鎮東方九日其災自滅凶逆自消一方仁人蒼龍來翔善瑞自至國土太平書文佩身却諸禍殃身無橫患常與神明相當保國寧家享福無窮道士書赤帝真文置南方則南嶽仙官至長齋百日精思靈寶尊神則天真下降給朱陵玉女三人取南嶽神仙芝草不死之藥赤帝鬼魔逺舍三萬里一方凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土南方及夏三月有災欲使南鄉安鎮當朱書赤石上鎮南方三日其災自滅凶逆自消一方仁人善瑞顯明鳯凰來迎鸞鶴飛鳴天人歌詠欣國太平書文佩身萬災不生禳凶却穢坐致神靈福慶無窮延年長生家致興隆國祚安寧道士書黃帝真文置中央則中嶽仙官至長齋百日精思靈寶尊神則天真下降給黃素玉女十二人取中嶽神仙芝草不死之藥黃帝鬼魔逺舍十二萬里中央凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土中央及四季月有災欲使中國安鎮當朱書黃石上鎮中央十二日其災自滅凶逆自消四方和睦善瑞自生麒麟來歸白虎遊庭國豐民富普天安寧書文佩身萬災不經身康氣強五宫精明長保家國永亨利貞道士書白帝真文置西方則西嶽仙官至長齋百日精思靈寶尊神則天真下降給太素玉女七人取西嶽神仙芝草不死之藥白帝鬼魔逺舍七萬里西方凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪神仙國土西方及秋三月有災欲使西鄉安鎮當朱書白石上置西方七日其災自滅凶惡自消西方自歸善祥自集靈獸飛軒金雀㗸符氐老歸賔國寧民泰書文佩身神明交遊災不加身與五帝同儔子孫昌熾世享王侯與善因緣何慮何憂道士書黑帝真文置北方則北嶽仙官至長齋百日精思靈寶尊神則天真下降給太玄玉女五人取北嶽神仙芝草不死之藥黑帝鬼魔逺舍五萬里北方凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪神仙國土北方及冬三月有災欲使北鄉安鎮當朱書黑石上置北方五日其災自消凶惡自滅北方自賔善瑞日昌地藏發泄金玉露形天人歌詠國富民豐書文佩身萬災消亡壽同天地福祿永光所向所求莫不利貞子孫昌盛世世賢明道士學至道上法修奉齋戒精思念道上希靈真滅魔却試皆當先按靈寶上元舊格施案真文鎮於方面靈真降室五帝官屬侍衛門戶鬼魔消滅所向咸從赤書青帝真文於青繒上置室東璧赤書赤帝真文絳繒上置南璧赤帝黃帝真文黃繒上置中央赤書白帝真文白繒上置西璧赤書黑帝真文黑繒上置北璧施案五篇於齋堂之中朝暮燒香隨方禮拜不得雜俗異人干入堂內此皆方方各有威神玉童玉女侍衛犯之奏罪九天冥考立加奉者明愼禁忌九氣青天中有元始青靈之童諱開陽青典青帝赤書真文青靈童長九寸衣青羽衣手執青麾侍文左學者應思此神降已身百日精念靈真見形所求立感有佩真文此童亦常在巳肝府之中致青牙之精三氣丹天中有元始赤靈之童諱丹泉珠典赤帝赤書真文赤靈童長三寸衣赤羽衣手執赤節侍文前學者應思此神降已身百日精念靈真見形所求易感有佩真文此童亦常在巳心中致朱丹赤牙之精中央黃天中有元始黃靈之童諱洪瑛典黃帝赤書真文黃靈童長一寸二分衣黃羽衣手執黃鉞侍文中央學者應思此神降已身百日精念靈真見形所求立感有佩真文此童亦常在已脾府之中致黃牙之精十氣素天中有元始素靈之童諱明石流典白帝赤書真文素靈童長七寸衣白羽衣手執白旗侍文右學者應思此神降已身百日精念靈真見形所求立感有佩真文此童亦常在已肺府之中致素牙之精五氣玄天中有元始黑靈之童諱玉滋典黑帝赤書真文黑靈童長五寸衣黑羽衣手執黑幢侍文後學者應思此神降已身百日精念靈真見形所求立感有佩真文此童亦常在巳腎府之中致玄牙之精此五帝靈童與元始五老同生主五篇真文上統九天之氣下領五嶽中主人五藏引牙之精補養人身服食五牙不知此神終而無感徒勞疲勤太上洞玄靈寶赤書玉訣妙經卷上
