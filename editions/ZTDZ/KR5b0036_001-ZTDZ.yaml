body:
  text: 右朱書銀木簡上以青紙裹簡青絲纏之金龍負簡以投三河之淵初用金鈕九𨾏連簡沉之後投不須三過都止投簡當於清泠之淵北向叩齒三通讀簡文呪曰元始五老上帝髙尊十方至眞太華靈仙赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝溟泠大神今日上告萬願開陳請投玉簡乞削罪名千曽萬祖九族種親罪根連染及得我身普蒙削除絶滅種根記名水府言上帝前七祖父母去離八難上登九天衣食自然我罪釋散萬神咸聞請以金鈕關明水官請如斯陳金龍驛傳元始靈寳告五嶽靈山除罪求仙上法靈寳某帝先生某甲年如干歳某月生命屬某帝名係泰山願神願仙長生度世飛行上清五嶽眞人至神至靈乞削罪籍上聞九天請詣靈山金龍驛傳太歳某甲子某月某朔某日某時於某嶽告文右朱書銀木簡青紙裹之青絲纏之金鈕九隻金龍負之埋本命之嶽悉如上法於本命之嶽東向叩齒九通讀簡文竟呪曰玄上開明元始監眞上帝五老赤書丹文天地本始總領三元攝氣召㑹催促降仙髙上符命普告十天日月星宿五嶽靈山天下地上溟泠大神監生主録南上三門開領玉簡勒名丹篇削落罪書上補帝臣千曽萬祖九族種親皆蒙解脫五道八難去離三惡魂升九天生死開度萬劫長存今日上告萬神咸聞請以金鈕關盟眞官請如所告金龍驛傳元始靈寳告九地土皇滅罪言名求仙上法靈寳某帝先生某甲年如干歳某月生命係九天東斗領籍願神願仙長生度世飛行上清中皇九地戊已黄神土府五帝乞削罪録勒上太玄請詣中宫投簡記名金鈕自信金龍驛傳太歳某甲子某月某朔某日某時於某郡縣中告文右朱書銀木簡青紙裹之青絲纏之金紐九隻金龍負之埋所住中宫悉如上法於中庭向壬叩齒十二通讀簡文竟呪曰天開地張九炁分靈三元同符十方朗清五老上帝開眞領生丹書赤文元始上精普告天下九土皇靈今日上告萬仙定生我願我仙請投玉名土府太皇勒除罪刑奏簡上宫列簿華青早得飛騰天地同靈九祖種親腐骸更榮魂升南宫受化仙庭日吉告命萬神咸聽請以金鈕表盟至情請如所告金龍驛呈道曰爾有志心發无上道意欲度諸天人民善男善女咸使得離三惡五道八難之中得過惡世與道相值當以八莭甲子之日投三元玉簡除宿罪簿言名上天事事三過諸天三官九府更相囑寄上天分别萬神敬護五帝侍衞三界司迎門户整肅天下地祇日月來朝千魔萬精不敢妄干志願堅白蠲向咸成七祖父母即得解脫三途五苦上昇天宫生死福慶影響相酬三官九府書人功過其理甚明世世因縁毫分無虧爾諦奉行勿爲懈怠使魔壞爾眞東方九炁青天眞文赤書玉訣東方九炁始皇青天碧霞鬱壘中有老人總校圖録攝炁降仙其二十四字主召九天上帝校神仙圖録學仙道士常以本命甲子立春之日青書二十四字於白剌記姓名年月於剌下投靈山之嶽九年仙官到使青腰玉女九人身得飛仙歳星輔肝角亢鎭眞氐房心尾四景廻旋箕主七辰正斗明輪承炁捕非掃除災群其三十二字主召天宿星官正天分度諸以天災星宿越錯朱書三十二字於青𥿄上露於中庭九日九夜夕夕依法别呪訖以火焚散灰於青烟之中并刻書三十二字於青石上埋東方天災自消星宿復位東山神呪攝召九天赤書符命制㑹酆山束魔送鬼所誅無蠲悉詣木宫敢有稽延其三十二字主攝鬼魔正九天炁行此法朱書青木剌上以文向東北而依别呪文三呪鬼自束形萬妖自滅精心行之下制東河溟海水神大劫洪災蛟龍負身水府開道通逕百千上帝赤文風火無間其三十二字主攝東海水帝大劫天災之數召蛟龍及水神事遇水災及欲渡大水黄書三十二字於青𥿄上依别呪以投水中身自得過蛟龍負載河伯奉迎水下可行也合一百二十字皆元始自然之書一名生神寳眞洞玄章一名東山神呪八威䇿文南方三炁丹天眞文赤書玉訣南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三炁勃光神仙受命應運太陽其三十二字主九天神仙圖録宿名學仙道士常以本命甲子立夏之日朱書三十二字於白剌上記姓名年月於剌下投靈山之嶽九年仙官到使朱陵玉女三人身得飛仙熒惑輔心井鬼守房柳星張翼統御四郷軫總七宿廻轉天常召運促㑹正道驛行赤文命靈其三十六字主召星官明度數正天分度南方星宿越錯有諸災異當朱書青紙上露於中庭三日三夜夕夕南向依别呪法訖以火燒文散之於青煙之中并别刻書三十六字於赤石上埋南方天災自消星宿復位北攝酆山束送魔宗符教所討明列罪源南山神呪威伏百千群妖滅爽萬試摧亡其三十二字主制北酆正鬼炁行此法黄書赤木剌上以文向北而依别呪文三行此法鬼精自滅萬魔束形宜精心行之南河水帝太伯龍王神呪流行普掃不祥洪水飛災止蛟召龍開除水逕千道萬通敢有干試攝送火宫赤書所告莫有不從其四十八字主攝南海水帝大運交洪水四出召蛟龍水神事遇此災及渡大水皆黄書四十八字於青𥿄上依别呪以投水中自得過度水官奉迎合一百四十八字皆南方梵寳昌陽丹靈眞老君自然之書一名南雲通天寳靈衿一名九天神呪一名赤天八威䇿文中央黄天眞文赤書玉訣中央總靈黄上天元始生五老中黄髙尊攝炁監眞總領群仙典録玄圖宿簡玉文催運上炁普告萬神其四十字主神仙玉簡宿名總歸仙炁學仙道士以本命甲子春分夏至之日黄書四十字於白剌上記姓名年月於剌下投靈山之嶽九年仙官到使黄素玉女十二人身得神仙鎭星輔脾廻度北元魁𩲃主非截邪斬根𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛傳其四十字主攝星官正天度數諸中央星宿越錯生諸災異當以朱書四十字於青紙露於中庭十二日十二夜夕夕向王依别呪法訖以火燒文散之於青煙之中并刻書四十字於黄石上埋中央天災自消星宿復位勑攝北帝遏塞鬼門剪除不祥莫有當前其十六字主攝北帝正天氣檢鬼精行此法白書十六字於黄木剌上以文向東北而依别呪文三行此法鬼精自滅天魔束形宜心行之中山神呪召龍上雲制㑹黄河九水河源不得怠縱善惡悉分千妖萬姧上對帝君莫有干試太陽激燌赤書玉字宣告普聞其四十八字主攝中海水帝四源之水洪灾湧溢之數召水神及蛟龍事欲過洪水之灾及渡大水皆當黄書四十八字於青紙上依别呪投水中自得過渡水官奉迎合一百四十四字皆中央玉寳元靈元老君自然之書一名寳劫洞清九天靈書一名黄神大呪一名黄帝威靈筞文西方七炁素天赤書玉訣西方素天白帝七門金靈皓映太華流氛白石峨峨七炁氤氲上有始生皇老大神總領肺氣主校九天檢定圖録制召上仙其四十八字主召仙炁學仙道士常以本命甲子立秋之日白書四十八字於白剌上記姓名年月於剌下投靈山之嶽九年仙官到使太素玉女七人身得神仙太白檢肺奎婁守魂胃昴畢觜主制七關參總斗魁受符北元其二十四字主白帝星官正明天度諸西方星宿越錯有諸災異當以朱書青紙上露於中庭七日七夜夕夕向西依别呪法訖以火燒文散灰於青煙之中并刻書二十四字於白石上埋西方天災自消星宿復位赤書玉字九天正文攝召萬炁普歸帝君其十六字主攝六天鬼炁行此法黒書十六字於白木剌上以文向東北而依别呪文七過行之鬼精自滅萬魔束形宜精心行之西山神呪八威七傳符水上龍召山送雲在此授得同到帝門輔衞上眞斬滅邪源若有不祥截以金關赤書符命風火驛傳其四十八字主攝西海水帝及水中萬精召雲龍以防水災欲知水中精物及洪水彌天欲度此災皆黄書四十八字於青𥿄上依别呪法投文水中立知水中萬精形象蛟龍負以渡水災水官奉迎也合一百三十六字皆西方七寳金門皓靈皇老君自然之書一名金眞寳明洞微篇一名西山神呪一名八威召龍文北方五炁玄天眞文赤書玉訣北方玄天五炁徘徊中有黒帝𩀱皇太微總領符命仙錬八威青裙羽褐龍文鳳衣上帝所降制列玉階其四十字主諸眞人神仙圖録學仙道士常以本命甲子立冬之日黒書四十字於白剌上記姓名年月於剌下靈山之嶽五年仙官到使太玄玉女五人名上仙籍矣北辰輔腎斗牛衞扉女虚危室豁落四開璧總七星執凶紏非却災掃穢明道洞輝其三十二字主北方星官正天炁諸以北方星宿越錯有諸災異當以朱書三十二字於青紙上露於中庭五日五夜夕夕向北依别呪法訖以火燒文散灰於青煙之中并刻書三十二字於黒石上埋北方天災自消星宿復位北山神呪激陽起雷流鈴煥落玃天振威北酆所部萬妖滅摧其二十四字主攝天魔北帝萬鬼事行此法青書二十四字於黒木剌上以文向東北而依别呪文五過行之鬼精自滅萬魔束形宜精心行之也九河傾竭烏母群飛蛟龍通道水脉洞開赤文玉書驛龍風馳其二十四字主攝北海水帝制水中萬精召蛟龍以負身欲渡大水洪災及遇水難中萬物黄書二十四字於青紙上依别呪文投水中萬物形象身得渡水災蛟龍開水道水官出迎也合一百二十字皆北方洞隂朔單鬱絶五靈玄老君自然之書一名元神生眞寳明文一名北山神呪一名八威制天文諸以啓願求道投剌行事莫不悉先東向叩齒三通捻香呪曰無上三天玄元始三炁太上老君召出我身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符各三十六人出關啓此間土地四面眞官我今正爾燒香關啓願得十方正眞之炁入我身中令所啓上聞俓御無上至眞大聖尊神玉帝几前凡學道有所求願及修行上法不先關啓則爲邪魔所干不得上達所修無感神明不鑒徒勞無益元始五老修道求仙赤書眞文玉訣道言夫學上法思神念道山居靜志修齋誦經轉度七祖身求神仙當行五老赤書眞文上法依按舊文皆先叩齒十二通呪曰玄上髙靈元始尊神大聖徘徊萬神臨軒三景敷暉慶雲四陳上告校圖推筭九天今日啓願投剌靈山丹書赤字自然眞文上告五帝記名玉篇萬神鑒映日月明言願度願生願神願仙天地星宿玄照我身三官九府五嶽大神普告無窮削除罪根元始大開莫不納言七祖幽魂受福自然三途五苦永離八難得與三景同暉紫晨輪轉不滅身得飛仙畢讀剌竟投於絶巖之中便散香靈山之上又叩齒三通向本命呪曰元始監映仙名巳書三官九府罪莫不除散香五帝告盟太虚請如所陳萬劫長居畢仰咽九炁止元始五老禳星宿客災明天分度眞文玉訣道言諸天星宿各有分度至於俓道錯越更相侵犯或有異見於四方境域皆由天氣運度否激之災有所防出其分國故以天光轉照玄告不祥故元始垂文和天安地解災却患安國寧民至士精心依法修行災見之日書眞文如舊法露於中庭向方面叩齒十二通散髮仰祝曰元始上天三光髙明廻景照耀四方朗清運度所衝激揚流星五界錯越三統失寧五斗總辰七宿明靈眞君大魁厥諱玉精夫人皇妃字曰育嬰總御玄關廻轉諸天今有客災玄告不祥請以眞文赤書上呈散髮謝愆披露丹誠惟垂玄監廻復天經炁不横越災不横生焚燒靈文散煙玉庭上景監度普告萬靈氣清三關災滅九㝠隂陽調和國土太平請以金龍風馬驛呈畢露眞文於中庭金龍鎭之假令災在東方則九日九夜竟而燒眞文散灰於青煙之中凡禳天災安國寧民法皆隨方然燈照諸天光假令東方則然九燈亦可九十燈亦可九百燈用金龍一兩一枚災在東方用青繒九十尺九日九夜災在南方則然三燈亦可三十燈亦可三百燈用絳繒三十尺三日三夜災在中央則然十二燈亦可百二十燈亦可千二百燈用黄繒百二十尺十二日十二夜災在西方則然七燈亦可七十燈亦可七百燈用白繒七十尺七日七夜災在北方則然五燈亦可五十燈亦可五百燈用黒繒五十尺五日五夜此元始靈寳上元科法元始五老禳大劫洪水召蛟龍水官度災眞文玉訣道言天地大劫之交洪水四出蕩穢除惡萬無遺一當此之時天地㝠合人民漂流無復善惡唯有志學之士得靈寳眞文大劫小劫之符乃可乗飛羽而髙觀登靈嶽而浮翔當此之時神人自當使蛟龍爲通路開水徑以渡身河伯伺迎不罣津梁也乃明靈文之妙豈拘大劫之交遇此之際當依其文施用北向叩齒五通閉氣二十五息存已身心中生火火出頭頂而燒四方山林草木及已身都盡形骸皆成灰塵一時飛翔入青煙之上無復所遺思大水浩浩蕩蕩天下已身化成蛟龍隨水而流因又叩齒二十五通仰呪曰上始廻靈開明九元天推地轉二炁流傳五行相促運度機關隂陽否激結成災衝大劫傾汔蕩穢除氛九河受對洪災激川水母徘徊鳥馬合群日月㝠㑹三景停關上選種臣推校玉文棄惡遺善清濁永分我參帝簡名列九天大災四㑹赤書所蠲是日告命萬神咸聞日月五星照明我魂五嶽靈山浮渡我身九河水府溟泠大神開除水徑通利河津蛟龍應符攝山送靈負我渡我驚馳四奔丹書赤字元始眞文金龍驛呈時刻無間立須告御上對帝尊畢引氣二十五咽須㬰自當有開水之神以渡兆身也在山山則浮在水水自開可謂臨危而濟倐欻之頃天地都平也元始五老攝召北酆鬼魔赤書玉訣道言夫受靈寳上法致神明來降存念響達與天眞交㑹宜先分别鬼魔形象遏塞干試魔精旣伏存思自感神明易致行此之法依上眞文施行便向東北叩齒三十六通閉炁九息而仰呪曰三元開明廻轉天常運推數極百六乗綱大劫交㑹萬妖争行北酆不拘放逸鬼宗群魔縱肆祅閉天光上帝有命普告十方演明天魔法教開張正道治民掃除不祥有何小妖群聚爲場赤書玉文檢攝鬼郷北酆三官明速傳行千魔束爽萬鬼送形流鈴交煥激氣太陽金虎四邀天丁捕亡大小齊到不得匿藏元始所告列奏上宫元始靈寳五帝眞文玉訣道士服青帝眞符東向叩齒九通思青炁從口入注肝中生九重青華寳光徹映項後書符置前呪曰元上青精九炁大靈神光霞散流映東青華景鬱勃灌我身形宫府安鎭寳魂自生洞達八朗飛昇玉庭畢引炁九咽上應服者服佩者佩道士服赤帝眞符南向叩齒三通思赤炁從口入注心中生三重丹華寳光徹映胷前書符置前呪曰丹華流映寳芝生光神精徹幽散靈八方眞符攝炁嘯命朱童三精煥敷注我絳宫赤神安鎭五香溢充洞映形外表裏發光身生水火獨歩飛行畢引炁三咽止如上法道士服黄帝眞符向王叩齒十二通思黄炁從口入注脾中生十二重黄華寳光洞映一身書符置前呪曰緫元書靈廻神四鄉黄上散華五帝交芳流精散漫十二重光混合我形萬神相迎安備黄脾養炁中房保齡度劫永鎭無窮畢引炁十二咽止如上法道士服白帝眞符向西叩齒七通思白炁從口入注肺中生七重素華寳光洞映丹田書符置前呪曰金靈七炁素華流氛金精童子首建元巾帶符攝炁萬神㑹門寳光奕奕照我命根安鎭肺華萬劫長存畢引炁七咽止如上法道士服黒帝眞符向北叩齒五通思黒炁從口入注腎中生五重玄寳華光洞映背外書符置前呪曰北上太玄五炁徘徊寳華五重流光煥暉雲景鬱秀洞映太微仰注我身腎府鮮開安鎭靈宅萬神總歸身生羽服降形自飛畢引炁五咽止如上法當取靈山向王之竹全長七尺七節作神杖使上下通直甘竹乃佳書黒帝符著下第二節中次白帝符第三節中次黄帝符第四節中次赤帝符第五節中次青帝符第六節中空上一節以通天空下一節以立地蠟封上節穿中印以元始之章又蠟封下節穿中印以五帝之章絳紋作韜長短大小足容杖卧息坐起常以自隨行來可脫杖衣隱以出入每當别著淨處以杖指天天神設禮指地地祇司迎以杖指東北萬鬼束形乗杖行來及欲施用當叩齒三十六通思五帝直符吏各一人衣隨方色有五色之光流煥杖上五帝玉女各一人合共衞杖左右微呪曰太陽之山元始上精開張天地甘竹通靈直符守吏部御神兵五色流煥朱火金鈴輔翼上眞出幽入㝠召天天恭攝地地迎指鬼鬼滅妖魔束形靈符神杖威制百方與我俱成與我俱生萬劫之後以代我形景爲五解神昇上清承符告命靡不敬聽畢引五方炁各五咽合二十五咽止行此道九年精謹不慢神眞形見杖則載人空行若欲尸解杖則代形儵歘之間巳成眞人朔望八節日當焼香左右朝拜此杖則神靈感降道則成矣靈寳八威神䇿玉訣當朱書三天太上召伏蛟龍虎豹山精文著一銀木板上又書記年月師姓諱著一板上合二板内囊裹朱書次文著一板上著囊外凡三板合封爲神䇿如傳之狀板悉用銀木長一尺四寸廣二寸四分以絳紋之繒作囊令長一丈二尺衣之封外板上下頭印口中元始五老之章當以栢木函絳紋作衣衣函以請䇿文著别室焼香左右精心供養受以佩身天下神靈朝夕朝門給五帝玉童玉女各一十二人出人遊行五帝侍衞三界司迎生死無復三惡之難不經泰山俓昇九天衣食自然位同太極要自成仙至學道士佩此文施行神呪以䇿文指天天神設禮指地地祇朝拜三界束帶指神神禮指鬼鬼自滅爽指水水神通道大劫交洪災四㑹以䇿召龍龍爲負身長修積感神靈交㑹所在施召降響立到千變萬竒適意所從出入行年位唯太極皆前從飛龍從導天鈞鳳嘯鸞鳴十二華光建三七色節㑹靈之旛精思九年天儀自備靈寳八威神䇿呪曰元始太眞五靈髙尊太華皓映洞朗八門五老告命無幽不關上御九天中制酆山下領河海十二水源八威神呪靈䇿玉文召龍負水收氣聚雲束魔送鬼掃蕩妖群萬精摧落所誅無蠲日月五星北斗七元諸天諸地諸水諸山玉眞所部溟泠大神仙王遊宴五帝杖旛天丁前驅金虎後奔玃天猛獸羅備四關所呼立到所召立前赤書煥落風火無間所有攝驗金龍驛傳畢叩齒九通仰天三嘯引天炁三咽以䇿文指所告之地閉炁九息而止元始五老鎭靈求仙禳災赤書玉訣道士隱學書青帝赤書眞文置東方則東嶽仙官至長齋百日精思靈寳尊神則天眞下降給青腰玉女九人取東嶽神仙芝草不死之藥青帝鬼魔逺舍九萬里一方凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土東方及春三月有災欲使東郷安鎭當赤書青石上鎭東方九日其災自滅凶逆自消一方仁人蒼龍來翔善瑞自至國土太平書文佩身却諸禍殃身無横患常與神明相當保國寧家享福無窮道士書赤帝眞文置南方則南嶽仙官至長齋百日精思靈寳尊神則天眞下降給朱陵玉女三人取南嶽神仙芝草不死之藥赤帝鬼魔逺舍三萬里一方凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土南方及夏三月有災欲使南郷安鎭當朱書赤石上鎭南方三日其災自滅凶逆自消一方仁人善瑞顯明鳯凰來迎鸞鶴飛鳴天人歌詠欣國太平書文佩身萬災不生禳凶却穢坐致神靈福慶無窮延年長生家致興隆國祚安寧道士書黄帝眞文置中央則中嶽仙官至長齋百日精思靈寳尊神則天眞下降給黄素玉女十二人取中嶽神仙芝草不死之藥黄帝鬼魔逺舍十二萬里中央凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪成仙國土中央及四季月有災欲使中國安鎭當朱書黄石上鎭中央十二日其災自滅凶逆自消四方和睦善瑞自生麒麟來歸白虎遊庭國豐民富普天安寧書文佩身萬災不經身康氣强五宫精明長保家國永亨利貞道士書白帝眞文置西方則西嶽仙官至長齋百日精思靈寳尊神則天眞下降給太素玉女七人取西嶽神仙芝草不死之藥白帝鬼魔逺舍七萬里西方凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪神仙國土西方及秋三月有災欲使西郷安鎭當朱書白石上置西方七日其災自滅凶惡自消西方自歸善祥自集靈獸飛軒金雀㗸符氐老歸賔國寧民泰書文佩身神明交遊災不加身與五帝同儔子孫昌熾世享王侯與善因縁何慮何憂道士書黒帝眞文置北方則北嶽仙官至長齋百日精思靈寳尊神則天眞下降給太玄玉女五人取北嶽神仙芝草不死之藥黒帝鬼魔逺舍五萬里北方凶勃惡獸毒螫皆不生害心反善仁人長齋修行二十四年身得神仙但佩此文亦得尸解轉輪神仙國土北方及冬三月有災欲使北鄕安鎭當朱書黒石上置北方五日其災自消凶惡自滅北方自賔善瑞日昌地藏發泄金玉露形天人歌詠國富民豐書文佩身萬災消亡壽同天地福禄永光所向所求莫不利貞子孫昌盛世世賢明道士學至道上法修奉齋戒精思念道上希靈眞滅魔却試皆當先按靈寳上元舊格施案眞文鎭於方面靈眞降室五帝官屬侍衞門戸鬼魔消滅所向咸從赤書青帝眞文於青繒上置室東璧赤書赤帝眞文絳繒上置南璧赤帝黄帝眞文黄繒上置中央赤書白帝眞文白繒上置西璧赤書黒帝眞文黒繒上置北璧施案五篇於齋堂之中朝暮燒香隨方禮拜不得雜俗異人干入堂内此皆方方各有威神玉童玉女侍衞犯之奏罪九天㝠考立加奉者明愼禁忌九炁青天中有元始青靈之童諱開陽青典青帝赤書眞文青靈童長九寸衣青羽衣手執青麾侍文左學者應思此神降已身百日精念靈眞見形所求立感有佩眞文此童亦常在巳肝府之中致青牙之精三炁丹天中有元始赤靈之童諱丹泉珠典赤帝赤書眞文赤靈童長三寸衣赤羽衣手執赤節侍文前學者應思此神降已身百日精念靈眞見形所求易感有佩眞文此童亦常在巳心中致朱丹赤牙之精中央黄天中有元始黄靈之童諱洪瑛典黄帝赤書眞文黄靈童長一寸二分衣黄羽衣手執黄鉞侍文中央學者應思此神降已身百日精念靈眞見形所求立感有佩真文此童亦常在已脾府之中致黄牙之精十炁素天中有元始素靈之童諱明石流典白帝赤書眞文素靈童長七寸衣白羽衣手執白旗侍文右學者應思此神降已身百日精念靈眞見形所求立感有佩眞文此童亦常在已肺府之中致素牙之精五炁玄天中有元始黒靈之童諱玉滋典黒帝赤書眞文黒靈童長五寸衣黒羽衣手執黒幢侍文後學者應思此神降已身百日精念靈眞見形所求立感有佩眞文此童亦常在巳腎府之中致玄牙之精此五帝靈童與元始五老同生主五篇眞文上統九天之炁下領五嶽中主人五藏引牙之精補養人身服食五牙不知此神終而無感徒勞疲懃太上洞玄靈寳赤書玉訣妙經卷上
