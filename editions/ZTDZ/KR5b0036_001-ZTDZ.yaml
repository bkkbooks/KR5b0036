front:
  text: 太上洞玄靈寳赤書玉訣妙經卷上乃一爾時元始天尊太上大道君五老上帝十方大神㑹於南丹洞陽上舘坐明珠七色寳座時有五帝大聖玄和玉女五萬二千五百衆詣座天灑香華神龍妓樂无鞅數衆紫雲四敷三景齊明天元合慶衆眞齊駕時有精進學士王龍賜侍座請受法戒道告龍賜吾於七百萬劫奉修靈寳立願布施持戒執齋勤苦不退展轉生死忍辱精進斷除異念空受無想積感玄寂得作衆聖道尊常用慈念欲令廣度衆生是男是女好願至人咸使得見靈寳妙法爾有善心來歸法門由爾前生萬劫巳奉至眞功滿德足致生道世值遇法興今當爲爾解說凝滯十部妙經使爾救度十方諸天人民勤爲用心勿使魔言道曰生死因縁輪轉福願莫不由身人身難得道世難遇經法難值訣言難聞吾所以敷張玄旨解說要言者何感念十方天人受生不能保度其身長處苦惱甘心履罪展轉五道無能覺者是故廣明法教開導愚蒙咸使天人得入旡上正眞之門普度一切生值此世眞以宿縁所從眞人皆得過度吾受元始眞文舊經說經度世萬劫當還无上宛利天過世後五濁之中運命不達是男是女不見明教常處惡道生壽無機而憂惱自嬰多受枉横自生自死輪轉五道墮於三途八難之中殃對相㝷無有極巳生死分離無有豪賤實爲痛心今解說諸要以度可度汝好正意諦受吾言於是注訣龍賜稽首伏受教旨道曰子受靈寳大戒當起北向首體投地禮於十方東向伏聽十戒一者心不惡妬無生隂賊檢口愼過想念在法二者守仁不殺愍濟群生慈愛廣救潤及一切三者守貞讓義不婬不盜常行善念損己濟物四者不色不慾心無放蕩貞潔守愼行無㸃汚五者口無惡言言不華綺内外忠直不犯口過六者減酒節行調和氣性神不損傷無犯衆惡七者不得嫉人勝己爭競功名毎事遜讓退身度人八者不得評論經教訾毀聖文躬心承法常如對神九者不得闘亂口舌評詳四軰天人咎恨傷損神氣十者舉動施爲平等一心人和神睦行常使然修奉清戒毎合天心常行大慈願爲一切普度厄世慊慊尊教不得中怠寧守善而死不爲惡而生於是不退可得拔度五道不履三惡諸天所護萬神所敬長齋奉戒自得度世道言靈寳開法度人有十二可從而得度世者爾宜從之自得正直終入無爲一者見眞經出法開度一切便發道意心願後世得登大聖二者常行慈心願念一切普得見法開度廣逺無有障翳三者好樂經教深逺覽達意志堅明開化愚闇四者尊受師訓廣開勸化令入法門逺離盲道五者信向玄妙尊奉經訣晨夕念誦無有怠倦六者不務榮華斷俗因縁專心定志所營在法七者勤誦大經願念一切廣開橋梁爲來生作縁八者常生善心不邪不僞無嫉無害無惡無妬九者在所隨生常值聖世與靈寳法教相值不絶十者潔身持戒修齋建功廣救群生咸得度脫十一者學業廣覽宣通經法預以天人普令開度十二者常與明師世世相值受教宣化度人無量是爲十二妙訣能行此善念世世得見聖文與道結縁諸天犮識獨歩三界無所罣礙長離三惡五道八難神明敬護地祇擁衞門戸清肅萬災不干諸所求願讀誦此經皆得成就是善男子善女人精心尊奉皆爲十方大聖所有洞達自然身生水火變化形影飛升上清功德未滿應經滅度即爲五帝所迎俓昇天宮不過泰山化生貴門與經道相遇俓得度世道告龍賜勤行諦受勿爲懈怠龍賜稽首伏承戒曰道言眞文呪說髙上法度舊文宛奥不可㝷詳後來學者難可施用故髙下注筆以解曲滯玉訣眞要開演古文微辭玄妙諸天所尊披誦玉章十方遥唱上天設禮神魔降伏鬼妖滅爽侍文玉童玉女各五十人自无前生萬劫題名太玄不得見此玉文運㑹遭遇尅得神仙福延九祖潤流玄孫皆得度脫三惡五道八難之中斯文尊貴妙不可勝元始靈寳告水帝削除罪簡上法靈寳某帝先生某甲年如干歳某月生願神願仙長生不死三元同存九府水帝十二河源江河淮濟溟泠大神乞削罪名上聞九天請詣水府金龍驛傳太歳某年某月某朔某日某時於某國告文
